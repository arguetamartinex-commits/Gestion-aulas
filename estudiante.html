<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus - Estudiante</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<nav>
    <div style="color:var(--cyan); font-weight:bold;">👨‍🎓 Estudiante</div>
    <div>Modelo 3D + Horarios</div>
    <button onclick="toggleSchedule()" id="max-btn" style="background:var(--cyan); color:#000; padding:8px 20px; border:none; border-radius:6px; font-weight:bold;">
        <i class="fas fa-expand"></i> <span id="btn-text">Maximizar 3D</span>
    </button>
</nav>

<div class="filter-panel">
    <label style="font-size:0.75rem;color:#888;">FILTRAR CARRERA</label>
    <select id="carrera-select" onchange="updateSchedule()">
        <option value="all">Todas las Carreras</option>
        <option value="ing">Ingeniería</option>
        <option value="arq">Arquitectura</option>
    </select>
</div>

<div class="legend">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><span style="width:12px;height:12px;background:var(--cyan);display:block;"></span> Planta Activa</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><span style="width:12px;height:12px;background:var(--yellow);display:block;"></span> Aula Seleccionada</div>
    <div style="display:flex;align-items:center;gap:8px;"><span style="width:12px;height:12px;background:var(--red);display:block;"></span> Escaleras</div>
</div>

<div id="canvas-container"></div>
<div id="schedule-drawer"><div class="schedule-grid" id="grid"></div></div>

<script src="script.js"></script>
</body>
</html>
