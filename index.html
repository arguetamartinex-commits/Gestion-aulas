<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus - Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a0a1f, #1a1a44);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container { text-align: center; }
        h1 { font-size: 48px; margin-bottom: 10px; color: #00f2ff; }
        p { font-size: 20px; color: #88ddff; margin-bottom: 60px; }
        .btn {
            display: inline-block; width: 340px; margin: 15px; padding: 28px 30px;
            border-radius: 16px; font-size: 24px; font-weight: 700; text-decoration: none;
            transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .estudiante { background: linear-gradient(90deg, #00b8cc, #00f2ff); color: #001122; }
        .docente { background: linear-gradient(90deg, #ff8800, #ffbb00); color: #001122; }
        .btn:hover { transform: scale(1.08); }
    </style>
</head>
<body>
    <div class="container">
        <h1>SMART CAMPUS</h1>
        <p>Selecciona tu rol para continuar</p>
        
        <a href="estudiante.html" class="btn estudiante">
            👨‍🎓 Soy Estudiante
        </a>
        <br>
        <a href="docente.html" class="btn docente">
            👨‍🏫 Soy Docente
        </a>
    </div>
</body>
</html>
